name: Update cloud market data

on:
  schedule:
    - cron: "30 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cloud-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install data dependencies
        run: python -m pip install --upgrade "numpy<3" "pandas<4" baostock

      - name: Build verified watchlist histories
        run: python scripts/build_cloud_seed.py --histories-only

      - name: Commit updated data
        run: |
          if git diff --quiet -- cloud_data/watchlist_history cloud_data/watchlist_history_manifest.json; then
            echo "Market data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud_data/watchlist_history cloud_data/watchlist_history_manifest.json
          git commit -m "Update cloud market data $(date -u +%F)"
          git push
